<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Jason Dinamarca — Ingeniería de software e IA aplicada">
  <!-- Fondo concreto -->
  <rect width="1200" height="630" fill="#e8e8e6"/>

  <!-- Grilla blueprint fina -->
  <g stroke="#0e0e0e" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>
  <!-- Grilla fuerte (modular) -->
  <g stroke="#0e0e0e" stroke-opacity="0.12" stroke-width="1">
    <path d="M300 0 V630 M600 0 V630 M900 0 V630"/>
    <path d="M0 270 H1200"/>
  </g>

  <!-- Marco tipo "plate" -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#0e0e0e" stroke-opacity="0.16" stroke-width="1"/>

  <!-- Esquineros de foco (signal) -->
  <g stroke="#ff5c00" stroke-width="3" fill="none" stroke-linecap="square">
    <path d="M24 56 V24 H56"/>
    <path d="M1144 24 H1176 V56"/>
    <path d="M1176 574 V606 H1144"/>
    <path d="M56 606 H24 V574"/>
  </g>

  <!-- Marca de señal superior izquierda -->
  <rect x="72" y="74" width="14" height="14" fill="#ff5c00"/>

  <!-- Etiquetas técnicas superiores -->
  <g font-family="&quot;JetBrains Mono Variable&quot;, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#56564f" letter-spacing="3">
    <text x="100" y="88">INGENIERÍA DE SOFTWARE · IA APLICADA</text>
    <text x="1128" y="88" text-anchor="end">33.438 S · 70.634 W</text>
  </g>

  <!-- Título -->
  <text x="72" y="330" font-family="&quot;Geist Variable&quot;, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="116" font-weight="700" letter-spacing="-4" fill="#0e0e0e">Jason Dinamarca</text>

  <!-- Regla de señal -->
  <rect x="72" y="356" width="168" height="6" fill="#ff5c00"/>

  <!-- Tagline -->
  <text x="72" y="410" font-family="&quot;JetBrains Mono Variable&quot;, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" fill="#56564f">Diseño sistemas sólidos y exploro cómo la IA los hace mejores.</text>

  <!-- Etiquetas inferiores -->
  <g font-family="&quot;JetBrains Mono Variable&quot;, ui-monospace, SFMono-Regular, Menlo, monospace" fill="#56564f">
    <text x="72" y="576" font-size="24" fill="#0e0e0e">jdinamarca.dev</text>
    <text x="1128" y="576" text-anchor="end" font-size="18" letter-spacing="2">OPEN GRAPH · 1200×630</text>
  </g>
</svg>
